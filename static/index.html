<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花花草草记录系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: bold;
        }

        .logo-icon {
            font-size: 28px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            font-weight: 500;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            color: #444;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .input-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 500;
            color: #555;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .examples {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .examples h4 {
            margin-bottom: 10px;
            color: #444;
        }

        .example-list {
            list-style: none;
            color: #666;
        }

        .example-list li {
            margin: 8px 0;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .records-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .record-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }

        .record-item:hover {
            transform: translateX(5px);
        }

        .record-item.confirmed {
            border-left-color: #4CAF50;
            background: #f1f8e9;
        }

        .record-item.pending {
            border-left-color: #FF9800;
            background: #fff8e1;
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .record-id {
            font-size: 14px;
            color: #666;
            background: #e9ecef;
            padding: 3px 10px;
            border-radius: 12px;
        }

        .record-status {
            font-size: 14px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 12px;
        }

        .status-confirmed {
            background: #4CAF50;
            color: white;
        }

        .status-pending {
            background: #FF9800;
            color: white;
        }

        .record-text {
            font-size: 16px;
            margin: 10px 0;
            color: #333;
        }

        .record-data {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }

        .data-row {
            display: flex;
            margin-bottom: 5px;
        }

        .data-label {
            font-weight: 500;
            min-width: 80px;
            color: #444;
        }

        .record-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .confirm-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .confirm-btn:hover {
            background: #45a049;
        }

        .confirm-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .reject-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .reject-btn:hover {
            background: #da190b;
        }

        .no-records {
            text-align: center;
            color: #888;
            padding: 40px 20px;
            font-size: 16px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">🌸</span>
            <span>花花草草记录系统</span>
        </div>
        <div class="user-info">
            <span class="username">欢迎，<span id="currentUsername">admin</span></span>
            <button class="logout-btn" id="logoutBtn">退出登录</button>
        </div>
    </nav>

    <div class="container">
        <!-- 左侧：提交记录 -->
        <div class="card">
            <h2>📝 记录植物状态</h2>
            <div id="messageContainer"></div>
            <div class="input-area">
                <div class="input-group">
                    <label for="plantText">用自然语言描述植物状态：</label>
                    <textarea id="plantText" placeholder="例如：黄瓜有一粒露白&#10;土豆有两棵可以培土了&#10;玫瑰开花了三朵，非常漂亮" required></textarea>
                </div>
                <button class="submit-btn" id="submitBtn">提交记录</button>
            </div>

            <div class="examples">
                <h4>🌱 示例输入：</h4>
                <ul class="example-list">
                    <li>黄瓜有一粒露白</li>
                    <li>土豆有两棵可以培土了</li>
                    <li>长条盆和大长条盆各多冒芽一棵</li>
                    <li>堆肥翻堆了一遍</li>
                    <li>玫瑰开花了三朵，非常漂亮</li>
                </ul>
            </div>
        </div>

        <!-- 右侧：记录列表 -->
        <div class="card">
            <h2>📋 记录列表</h2>
            <div class="records-list" id="recordsList">
                <!-- 记录将通过JavaScript动态加载 -->
                <div class="no-records" id="noRecords">暂无记录，请提交第一条记录</div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let refreshInterval;

        // 检查登录状态
        function checkLogin() {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = '/login.html';
                return false;
            }
            return true;
        }

        // 显示消息
        function showMessage(text, type = 'info') {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="message ${type}">${text}</div>`;
            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    container.innerHTML = '';
                }, 5000);
            }
        }

        // 加载记录
        async function loadRecords() {
            try {
                const recordsList = document.getElementById('recordsList');
                const noRecords = document.getElementById('noRecords');

                const response = await fetch('/api/records');
                const data = await response.json();

                if (data.success) {
                    const records = data.records;

                    if (records.length === 0) {
                        noRecords.style.display = 'block';
                        recordsList.innerHTML = '<div class="no-records" id="noRecords">暂无记录，请提交第一条记录</div>';
                        return;
                    }

                    noRecords.style.display = 'none';

                    // 按时间倒序排序（假设created_at是ISO字符串）
                    const sortedRecords = [...records].sort((a, b) =>
                        new Date(b.created_at) - new Date(a.created_at)
                    );

                    recordsList.innerHTML = sortedRecords.map(record => `
                        <div class="record-item ${record.confirmed ? 'confirmed' : 'pending'}">
                            <div class="record-header">
                                <span class="record-id">记录 #${record.id}</span>
                                <span class="record-status ${record.confirmed ? 'status-confirmed' : 'status-pending'}">
                                    ${record.confirmed ? '已确认' : '待确认'}
                                </span>
                            </div>
                            <div class="record-text">${record.original_text}</div>
                            <div class="record-data">
                                <div class="data-row">
                                    <span class="data-label">植物种类:</span>
                                    <span>${record.plant_type || '未识别'}</span>
                                </div>
                                <div class="data-row">
                                    <span class="data-label">动作:</span>
                                    <span>${record.action || '未识别'}</span>
                                </div>
                                <div class="data-row">
                                    <span class="data-label">数量:</span>
                                    <span>${record.quantity !== null ? record.quantity : '未识别'}</span>
                                </div>
                                ${record.notes ? `<div class="data-row">
                                    <span class="data-label">备注:</span>
                                    <span>${record.notes}</span>
                                </div>` : ''}
                                <div class="data-row">
                                    <span class="data-label">时间:</span>
                                    <span>${new Date(record.created_at).toLocaleString('zh-CN')}</span>
                                </div>
                            </div>
                            <div class="record-actions">
                                <button class="confirm-btn" onclick="confirmRecord(${record.id})" ${record.confirmed ? 'disabled' : ''}>
                                    ${record.confirmed ? '已确认' : '确认记录'}
                                </button>
                                <button class="reject-btn" onclick="rejectRecord(${record.id})" ${record.confirmed ? 'disabled' : ''}>
                                    拒绝
                                </button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    showMessage('加载记录失败: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('加载记录失败:', error);
                showMessage('网络错误: ' + error.message, 'error');
            }
        }

        // 提交记录
        async function submitRecord() {
            const text = document.getElementById('plantText').value.trim();
            const submitBtn = document.getElementById('submitBtn');

            if (!text) {
                showMessage('请输入植物描述', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';

            try {
                const response = await fetch('/api/record', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('记录已提交，请确认。记录ID: ' + data.record_id, 'success');
                    document.getElementById('plantText').value = '';

                    // 重新加载记录列表以显示新记录
                    await loadRecords();
                } else {
                    showMessage('提交失败: ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('网络错误: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交记录';
            }
        }

        // 确认记录
        async function confirmRecord(recordId) {
            try {
                const response = await fetch(`/api/record/${recordId}/confirm`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ confirm: true })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('记录已确认', 'success');

                    // 重新加载记录列表
                    await loadRecords();
                } else {
                    showMessage('确认失败: ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('网络错误: ' + error.message, 'error');
            }
        }

        // 拒绝记录
        async function rejectRecord(recordId) {
            if (!confirm('确定要拒绝这条记录吗？')) {
                return;
            }

            try {
                const response = await fetch(`/api/record/${recordId}/confirm`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ confirm: false })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('记录已拒绝', 'info');

                    // 重新加载记录列表
                    await loadRecords();
                } else {
                    showMessage('操作失败: ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('网络错误: ' + error.message, 'error');
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('username');
            window.location.href = '/login.html';
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 检查登录状态
            if (!checkLogin()) {
                return;
            }

            // 设置用户名
            const username = localStorage.getItem('username') || 'admin';
            document.getElementById('currentUsername').textContent = username;

            // 绑定事件
            document.getElementById('submitBtn').addEventListener('click', submitRecord);
            document.getElementById('logoutBtn').addEventListener('click', logout);

            // 文本区域回车提交（Ctrl+Enter）
            document.getElementById('plantText').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    submitRecord();
                }
            });

            // 初始加载记录
            loadRecords();

            // 每30秒刷新一次记录列表
            refreshInterval = setInterval(loadRecords, 30000);
        });

        // 清理定时器
        window.addEventListener('beforeunload', function() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });
    </script>
</body>
</html>
